<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Park Walker</title>
<style>
  :root {
    --green-deep: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #b7e4c7;
    --cream: #f8f5f0;
    --sand: #e9e3d8;
    --bark: #7a5c3a;
    --bark-light: #c49a6c;
    --white: #ffffff;
    --text-dark: #1a2e1f;
    --text-mid: #4a6358;
    --text-light: #7a9a87;
    --danger: #c0392b;
    --danger-light: #fadbd8;
    --shadow-sm: 0 2px 8px rgba(26,58,42,0.10);
    --shadow-md: 0 4px 20px rgba(26,58,42,0.15);
    --shadow-lg: 0 8px 40px rgba(26,58,42,0.20);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xl: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--green-deep);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-md);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon { font-size: 26px; }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--green-pale);
    margin-top: 1px;
    font-weight: 400;
  }

  /* ── TABS ── */
  .tabs {
    background: var(--green-deep);
    display: flex;
    padding: 0 16px 0;
    gap: 4px;
    border-bottom: 2px solid rgba(255,255,255,0.08);
  }
  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--green-pale);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    text-transform: uppercase;
  }
  .tab-btn.active {
    color: var(--white);
    border-bottom-color: var(--green-light);
  }

  /* ── CONTENT ── */
  .tab-content { display: none; flex: 1; }
  .tab-content.active { display: block; }

  /* ── TRACKER TAB ── */
  #tab-tracker {
    padding: 24px 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  #tab-tracker.active { display: flex; }

  /* Status pill */
  .status-pill {
    background: var(--sand);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    letter-spacing: 0.3px;
  }
  .status-pill.running {
    background: var(--green-pale);
    color: var(--green-mid);
  }

  /* Counters grid */
  .counters {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .counter-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px 10px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(26,58,42,0.07);
  }
  .counter-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--green-deep);
    line-height: 1;
    letter-spacing: -1px;
  }
  .counter-value.timer-val {
    font-size: 22px;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .counter-label {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-mid);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .progress-bar {
    background: var(--sand);
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--green-mid), var(--green-light));
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Big round button */
  .round-btn-wrap { position: relative; }
  .round-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--green-mid), var(--green-deep));
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 8px 32px rgba(45,106,79,0.45), 0 2px 8px rgba(0,0,0,0.15);
    transition: transform 0.12s, box-shadow 0.12s;
    -webkit-user-select: none;
    user-select: none;
  }
  .round-btn:active {
    transform: scale(0.93);
    box-shadow: 0 4px 16px rgba(45,106,79,0.35);
  }
  .round-btn.disabled {
    background: linear-gradient(145deg, #aaa, #888);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    cursor: not-allowed;
  }
  .round-btn-icon { font-size: 48px; }
  .round-btn-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.2;
  }

  /* Ripple ring */
  .ring {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 3px solid var(--green-light);
    opacity: 0;
    pointer-events: none;
  }
  .ring.pulse {
    animation: ripple 0.6s ease-out forwards;
  }
  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  /* Control buttons */
  .controls {
    width: 100%;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.2px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-start {
    background: var(--green-light);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(82,183,136,0.35);
  }
  .btn-end {
    background: var(--white);
    color: var(--bark);
    border: 2px solid var(--bark-light);
    box-shadow: var(--shadow-sm);
  }
  .btn-end:active { background: var(--danger-light); }
  .btn-danger {
    background: var(--danger);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(192,57,43,0.30);
  }
  .btn-ghost {
    background: var(--sand);
    color: var(--text-mid);
    flex: none;
    width: 100%;
  }
  .btn-secondary {
    background: var(--white);
    color: var(--text-mid);
    border: 1.5px solid var(--sand);
    box-shadow: var(--shadow-sm);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-deep);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    max-width: 320px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.error { background: var(--danger); }

  /* ── SETTINGS ── */
  .settings-wrap {
    width: 100%;
  }
  .settings-toggle {
    width: 100%;
    background: var(--white);
    border: 1.5px solid var(--sand);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-mid);
    box-shadow: var(--shadow-sm);
  }
  .settings-toggle .arrow { transition: transform 0.25s; font-size: 12px; }
  .settings-toggle.open .arrow { transform: rotate(180deg); }
  .settings-panel {
    background: var(--white);
    border: 1.5px solid var(--sand);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 0 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s;
  }
  .settings-panel.open {
    max-height: 300px;
    padding: 16px 18px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-label {
    font-size: 14px;
    color: var(--text-dark);
    font-weight: 500;
    flex: 1;
  }
  .setting-label small {
    display: block;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .setting-input {
    width: 90px;
    padding: 8px 12px;
    border: 1.5px solid var(--sand);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    color: var(--green-deep);
    text-align: center;
    background: var(--cream);
    outline: none;
  }
  .setting-input:focus { border-color: var(--green-light); }

  /* ── HISTORY TAB ── */
  #tab-history {
    padding: 20px;
    display: none;
  }
  #tab-history.active { display: block; }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .history-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-dark);
  }
  .history-count {
    font-size: 12px;
    color: var(--text-light);
    background: var(--sand);
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .history-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-light);
  }
  .history-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .history-empty p { font-size: 15px; line-height: 1.5; }
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(26,58,42,0.07);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .history-card-accent {
    width: 4px;
    min-height: 60px;
    background: linear-gradient(180deg, var(--green-mid), var(--green-light));
    border-radius: 4px;
    flex-shrink: 0;
  }
  .history-card-body { flex: 1; }
  .history-card-date {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .history-card-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .history-stat { text-align: left; }
  .history-stat-val {
    font-size: 20px;
    font-weight: 800;
    color: var(--green-deep);
    line-height: 1;
  }
  .history-stat-lbl {
    font-size: 11px;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
    margin-top: 2px;
  }
  .clear-btn-wrap { margin-top: 20px; }

  /* ── STOPWATCH TAB ── */
  #tab-stopwatch {
    padding: 24px 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  #tab-stopwatch.active { display: flex; }
  .sw-display {
    background: var(--green-deep);
    border-radius: var(--radius-xl);
    padding: 36px 40px;
    text-align: center;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .sw-time {
    font-size: 52px;
    font-weight: 800;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    letter-spacing: -1px;
    line-height: 1;
  }
  .sw-ms {
    font-size: 28px;
    color: var(--green-pale);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .sw-controls {
    width: 100%;
    display: flex;
    gap: 10px;
  }
  .sw-controls .btn { flex: 1; padding: 18px 8px; }
  .btn-lap {
    background: rgba(45,106,79,0.12);
    color: var(--green-mid);
    border: 2px solid var(--green-pale);
  }
  .laps-section { width: 100%; }
  .laps-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .laps-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .lap-item {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(26,58,42,0.07);
  }
  .lap-num { font-size: 12px; color: var(--text-light); font-weight: 600; }
  .lap-time { font-size: 16px; font-weight: 700; color: var(--green-deep); font-variant-numeric: tabular-nums; }
  .lap-split { font-size: 12px; color: var(--text-light); }

  /* Fastest/Slowest laps */
  .lap-item.fastest { border-left: 4px solid var(--green-light); }
  .lap-item.slowest { border-left: 4px solid var(--bark-light); }
</style>
</head>
<body>

<header>
  <span class="header-icon">🌿</span>
  <div>
    <div class="header-title">Park Walker</div>
    <div class="header-sub">Track your rounds</div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tracker')">🏃 Tracker</button>
  <button class="tab-btn" onclick="switchTab('history')">📋 History</button>
  <button class="tab-btn" onclick="switchTab('stopwatch')">⏱ Stopwatch</button>
</div>

<!-- ══ TRACKER TAB ══ -->
<div id="tab-tracker" class="tab-content active">
  <span id="statusPill" class="status-pill">Not started</span>

  <div class="counters">
    <div class="counter-card">
      <div class="counter-value" id="roundsVal">0</div>
      <div class="counter-label">Rounds</div>
    </div>
    <div class="counter-card">
      <div class="counter-value" id="stepsVal">0</div>
      <div class="counter-label">Steps</div>
    </div>
    <div class="counter-card">
      <div class="counter-value timer-val" id="timerVal">00:00</div>
      <div class="counter-label">Time</div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Progress</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="round-btn-wrap">
    <div class="ring" id="rippleRing"></div>
    <button class="round-btn disabled" id="roundBtn" onclick="completeRound()">
      <span class="round-btn-icon">👟</span>
      <span class="round-btn-label">Complete<br>1 Round</span>
    </button>
  </div>

  <div class="controls">
    <button class="btn btn-start" onclick="startActivity()">▶ Start</button>
    <button class="btn btn-end" onclick="endActivity()">⏹ End Activity</button>
  </div>

  <!-- Settings -->
  <div class="settings-wrap">
    <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
      <span>⚙️ Settings</span>
      <span class="arrow">▼</span>
    </button>
    <div class="settings-panel" id="settingsPanel">
      <div class="setting-row">
        <div class="setting-label">
          Steps per Round
          <small>Default: 400</small>
        </div>
        <input class="setting-input" type="number" id="stepsPerRound" value="400" min="1" max="9999" onchange="saveSettings()">
      </div>
      <div class="setting-row">
        <div class="setting-label">
          Target Rounds
          <small>0 = no target</small>
        </div>
        <input class="setting-input" type="number" id="targetRounds" value="0" min="0" max="999" onchange="saveSettings()">
      </div>
      <div class="setting-row">
        <div class="setting-label">
          Target Steps
          <small>0 = no target</small>
        </div>
        <input class="setting-input" type="number" id="targetSteps" value="0" min="0" max="99999" onchange="saveSettings()">
      </div>
    </div>
  </div>
</div>

<!-- ══ HISTORY TAB ══ -->
<div id="tab-history" class="tab-content">
  <div class="history-header">
    <span class="history-title">Activity History</span>
    <span class="history-count" id="historyCount">0 sessions</span>
  </div>
  <div id="historyList"></div>
  <div class="clear-btn-wrap" id="clearBtnWrap" style="display:none">
    <button class="btn btn-danger" onclick="clearHistory()">🗑 Clear All History</button>
  </div>
</div>

<!-- ══ STOPWATCH TAB ══ -->
<div id="tab-stopwatch" class="tab-content">
  <div class="sw-display">
    <div class="sw-time" id="swTime">00:00<span class="sw-ms">.<span id="swMs">00</span></span></div>
  </div>

  <div class="sw-controls">
    <button class="btn btn-start" id="swStartBtn" onclick="swStartPause()">▶ Start</button>
    <button class="btn btn-lap" id="swLapBtn" onclick="swLap()" disabled>Lap</button>
    <button class="btn btn-secondary" id="swResetBtn" onclick="swReset()">↺ Reset</button>
  </div>

  <div class="laps-section" id="lapsSection" style="display:none">
    <div class="laps-title" id="lapsTitle">Laps</div>
    <div class="laps-list" id="lapsList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════
//  STATE
// ════════════════════════════════
let trackerRunning = false;
let trackerRounds = 0;
let trackerStartTime = null;
let trackerElapsed = 0; // ms accumulated (so switching tabs doesn't reset)
let trackerTimerInterval = null;

let swRunning = false;
let swStartTime = null;
let swElapsed = 0;
let swInterval = null;
let swLaps = [];
let swLapStart = 0;

// ════════════════════════════════
//  INIT
// ════════════════════════════════
function init() {
  loadSettings();
  renderHistory();
  updateTrackerUI();
}

// ════════════════════════════════
//  TABS
// ════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['tracker','history','stopwatch'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') renderHistory();
}

// ════════════════════════════════
//  SETTINGS
// ════════════════════════════════
function saveSettings() {
  const s = getSettings();
  localStorage.setItem('pw_settings', JSON.stringify(s));
  updateProgress();
}
function loadSettings() {
  const raw = localStorage.getItem('pw_settings');
  if (!raw) return;
  const s = JSON.parse(raw);
  document.getElementById('stepsPerRound').value = s.stepsPerRound || 400;
  document.getElementById('targetRounds').value = s.targetRounds || 0;
  document.getElementById('targetSteps').value = s.targetSteps || 0;
}
function getSettings() {
  return {
    stepsPerRound: parseInt(document.getElementById('stepsPerRound').value) || 400,
    targetRounds: parseInt(document.getElementById('targetRounds').value) || 0,
    targetSteps: parseInt(document.getElementById('targetSteps').value) || 0,
  };
}
function toggleSettings() {
  const toggle = document.getElementById('settingsToggle');
  const panel = document.getElementById('settingsPanel');
  toggle.classList.toggle('open');
  panel.classList.toggle('open');
}

// ════════════════════════════════
//  TRACKER
// ════════════════════════════════
function startActivity() {
  trackerRunning = true;
  trackerRounds = 0;
  trackerStartTime = Date.now();
  trackerElapsed = 0;
  clearInterval(trackerTimerInterval);
  trackerTimerInterval = setInterval(tickTracker, 1000);
  updateTrackerUI();
  showToast('Activity started! Tap the button after each round. 🌿');
}

function completeRound() {
  if (!trackerRunning) return;
  trackerRounds++;
  updateTrackerUI();
  // Ripple
  const ring = document.getElementById('rippleRing');
  ring.classList.remove('pulse');
  void ring.offsetWidth;
  ring.classList.add('pulse');
  const s = getSettings();
  if (s.targetRounds > 0 && trackerRounds === s.targetRounds) {
    showToast('🎉 Target rounds reached!');
  }
  const steps = trackerRounds * s.stepsPerRound;
  if (s.targetSteps > 0 && steps >= s.targetSteps) {
    showToast('🎉 Target steps reached!');
  }
}

function endActivity() {
  if (!trackerRunning) {
    showToast('Start an activity first!', true); return;
  }
  if (trackerRounds === 0) {
    showToast('Complete at least 1 round before ending.', true); return;
  }
  clearInterval(trackerTimerInterval);
  trackerRunning = false;

  const s = getSettings();
  const entry = {
    date: new Date().toLocaleString(),
    rounds: trackerRounds,
    steps: trackerRounds * s.stepsPerRound,
    duration: formatTime(trackerElapsed + (Date.now() - trackerStartTime))
  };
  saveHistoryEntry(entry);
  showToast(`Saved! ${entry.rounds} rounds · ${entry.steps.toLocaleString()} steps 🎉`);
  trackerRounds = 0;
  trackerElapsed = 0;
  trackerStartTime = null;
  updateTrackerUI();
}

function tickTracker() {
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const elapsed = trackerRunning
    ? trackerElapsed + (Date.now() - trackerStartTime)
    : trackerElapsed;
  document.getElementById('timerVal').textContent = formatTime(elapsed);
}

function updateTrackerUI() {
  const s = getSettings();
  const steps = trackerRounds * s.stepsPerRound;
  document.getElementById('roundsVal').textContent = trackerRounds;
  document.getElementById('stepsVal').textContent = steps.toLocaleString();

  const pill = document.getElementById('statusPill');
  if (trackerRunning) {
    pill.textContent = '● Active';
    pill.className = 'status-pill running';
  } else {
    pill.textContent = 'Not started';
    pill.className = 'status-pill';
  }

  const btn = document.getElementById('roundBtn');
  btn.classList.toggle('disabled', !trackerRunning);

  updateTimerDisplay();
  updateProgress();
}

function updateProgress() {
  const s = getSettings();
  const steps = trackerRounds * s.stepsPerRound;
  const hasTarget = s.targetRounds > 0 || s.targetSteps > 0;
  const wrap = document.getElementById('progressWrap');
  wrap.classList.toggle('visible', hasTarget && trackerRunning);

  if (!hasTarget) return;
  let pct = 0, label = '';
  if (s.targetRounds > 0) {
    pct = Math.min(100, (trackerRounds / s.targetRounds) * 100);
    label = `${trackerRounds}/${s.targetRounds} rounds`;
  } else if (s.targetSteps > 0) {
    pct = Math.min(100, (steps / s.targetSteps) * 100);
    label = `${steps.toLocaleString()}/${s.targetSteps.toLocaleString()} steps`;
  }
  document.getElementById('progressText').textContent = label;
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ════════════════════════════════
//  HISTORY
// ════════════════════════════════
function getHistory() {
  return JSON.parse(localStorage.getItem('pw_history') || '[]');
}
function saveHistoryEntry(entry) {
  const h = getHistory();
  h.unshift(entry);
  localStorage.setItem('pw_history', JSON.stringify(h));
}
function clearHistory() {
  if (!confirm('Clear all history?')) return;
  localStorage.removeItem('pw_history');
  renderHistory();
  showToast('History cleared.');
}
function renderHistory() {
  const h = getHistory();
  const list = document.getElementById('historyList');
  const count = document.getElementById('historyCount');
  const clearWrap = document.getElementById('clearBtnWrap');
  count.textContent = h.length + (h.length === 1 ? ' session' : ' sessions');
  clearWrap.style.display = h.length > 0 ? 'block' : 'none';
  if (h.length === 0) {
    list.innerHTML = `<div class="history-empty">
      <div class="empty-icon">🌳</div>
      <p>No activities yet.<br>Complete your first walk to see it here.</p>
    </div>`;
    return;
  }
  list.innerHTML = h.map(e => `
    <div class="history-card">
      <div class="history-card-accent"></div>
      <div class="history-card-body">
        <div class="history-card-date">📅 ${e.date}</div>
        <div class="history-card-stats">
          <div class="history-stat">
            <div class="history-stat-val">${e.rounds}</div>
            <div class="history-stat-lbl">Rounds</div>
          </div>
          <div class="history-stat">
            <div class="history-stat-val">${Number(e.steps).toLocaleString()}</div>
            <div class="history-stat-lbl">Steps</div>
          </div>
          <div class="history-stat">
            <div class="history-stat-val">${e.duration}</div>
            <div class="history-stat-lbl">Duration</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ════════════════════════════════
//  STOPWATCH
// ════════════════════════════════
function swStartPause() {
  if (swRunning) {
    swElapsed += Date.now() - swStartTime;
    clearInterval(swInterval);
    swRunning = false;
    document.getElementById('swStartBtn').textContent = '▶ Resume';
    document.getElementById('swLapBtn').disabled = true;
  } else {
    swStartTime = Date.now();
    swInterval = setInterval(tickSw, 37);
    swRunning = true;
    document.getElementById('swStartBtn').textContent = '⏸ Pause';
    document.getElementById('swLapBtn').disabled = false;
    if (swLaps.length === 0) swLapStart = 0;
  }
}

function tickSw() {
  const total = swElapsed + (Date.now() - swStartTime);
  const ms = total % 1000;
  const secs = Math.floor(total / 1000) % 60;
  const mins = Math.floor(total / 60000) % 60;
  const hrs = Math.floor(total / 3600000);
  const timeStr = hrs > 0
    ? pad(hrs) + ':' + pad(mins) + ':' + pad(secs)
    : pad(mins) + ':' + pad(secs);
  document.getElementById('swTime').firstChild.textContent = timeStr;
  document.getElementById('swMs').textContent = pad(Math.floor(ms / 10));
}

function swLap() {
  if (!swRunning) return;
  const total = swElapsed + (Date.now() - swStartTime);
  const lapTime = total - swLapStart;
  swLapStart = total;
  swLaps.push({ num: swLaps.length + 1, total, lapTime });
  renderLaps();
}

function swReset() {
  clearInterval(swInterval);
  swRunning = false;
  swElapsed = 0;
  swStartTime = null;
  swLaps = [];
  swLapStart = 0;
  document.getElementById('swTime').firstChild.textContent = '00:00';
  document.getElementById('swMs').textContent = '00';
  document.getElementById('swStartBtn').textContent = '▶ Start';
  document.getElementById('swLapBtn').disabled = true;
  document.getElementById('lapsSection').style.display = 'none';
}

function renderLaps() {
  const section = document.getElementById('lapsSection');
  const list = document.getElementById('lapsList');
  section.style.display = swLaps.length > 0 ? 'block' : 'none';
  if (swLaps.length === 0) return;
  document.getElementById('lapsTitle').textContent = `Laps (${swLaps.length})`;

  const times = swLaps.map(l => l.lapTime);
  const fastest = Math.min(...times);
  const slowest = Math.max(...times);

  list.innerHTML = [...swLaps].reverse().map(lap => {
    let cls = '';
    if (swLaps.length > 1) {
      if (lap.lapTime === fastest) cls = 'fastest';
      else if (lap.lapTime === slowest) cls = 'slowest';
    }
    return `<div class="lap-item ${cls}">
      <span class="lap-num">LAP ${lap.num}</span>
      <span class="lap-time">${formatMs(lap.lapTime)}</span>
      <span class="lap-split">${formatMs(lap.total)}</span>
    </div>`;
  }).join('');
}

// ════════════════════════════════
//  UTILS
// ════════════════════════════════
function pad(n) { return String(n).padStart(2, '0'); }

function formatTime(ms) {
  const secs = Math.floor(ms / 1000);
  const m = Math.floor(secs / 60) % 60;
  const s = secs % 60;
  const h = Math.floor(secs / 3600);
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function formatMs(ms) {
  const s = Math.floor(ms / 1000) % 60;
  const m = Math.floor(ms / 60000) % 60;
  const h = Math.floor(ms / 3600000);
  const c = Math.floor((ms % 1000) / 10);
  const base = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  return base + '.' + pad(c);
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
}

init();
</script>
